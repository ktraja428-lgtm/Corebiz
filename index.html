 <!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreBiz - Business Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F172A;color:#fff;font-family:system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#1E293B}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ROLES=[{key:"CEO",label:"CEO",icon:"👑",color:"#F59E0B"},{key:"SALES",label:"Sales",icon:"💼",color:"#3B82F6"},{key:"MARKETING",label:"Marketing",icon:"📣",color:"#8B5CF6"},{key:"HR",label:"HR",icon:"👥",color:"#10B981"},{key:"FINANCE",label:"Finance",icon:"💰",color:"#F97316"},{key:"OPERATIONS",label:"Operations",icon:"⚙️",color:"#EC4899"}];
const DATA={CEO:{stats:[{l:"Kamai",v:"₹12,40,000",up:true},{l:"Munafa",v:"₹3,20,000",up:true},{l:"Team",v:"47 log",up:true},{l:"Kharcha",v:"₹9,20,000",up:false}],tasks:["Q2 report check karo","Naye product approve karo","Meeting ki taiyari karo","Contract sign karo"]},SALES:{stats:[{l:"Aaj ke Orders",v:"34",up:true},{l:"Is Mahine",v:"₹4,80,000",up:true},{l:"Pending Deal",v:"12",up:false},{l:"Conversion",v:"68%",up:true}],tasks:["5 leads ko call karo","CRM update karo","Ramesh ka quotation bhejo","Weekly report banao"]},MARKETING:{stats:[{l:"IG Reach",v:"18,400",up:true},{l:"Campaigns",v:"3 chal rahi",up:true},{l:"Naye Leads",v:"210",up:true},{l:"Ad Kharcha",v:"₹12,000",up:false}],tasks:["3 reels post karo","Festival banner banao","WhatsApp broadcast bhejo","Campaign report dekho"]},HR:{stats:[{l:"Total Staff",v:"47",up:true},{l:"Chutti Pe",v:"4 log",up:false},{l:"Khaali Post",v:"6",up:false},{l:"Upasthiti",v:"91%",up:true}],tasks:["Marketing interview lo","June ki salary do","Handbook update karo","2 logon ko join karwao"]},FINANCE:{stats:[{l:"Cash Balance",v:"₹8,60,000",up:true},{l:"Milna Baki",v:"₹2,10,000",up:false},{l:"Dena Baki",v:"₹75,000",up:false},{l:"GST Status",v:"Sahi Hai ✓",up:true}],tasks:["Bank statement milao","Vendor ko paisa do","GST file karo","CEO ke liye P&L banao"]},OPERATIONS:{stats:[{l:"Stock",v:"1,240 kg",up:false},{l:"Dispatch Baki",v:"18",up:false},{l:"Aaj Pahuncha",v:"22",up:true},{l:"Wapas Aaya",v:"2",up:true}],tasks:["Ginger-garlic reorder karo","50 orders pack karo","Amla quality check karo","Inventory update karo"]}};
const TARGETS={SALES:{label:"Aaj ki Sale",target:"₹50,000",done:"₹34,200",pct:68},MARKETING:{label:"Naye Leads",target:"20",done:"14",pct:70},HR:{label:"Upasthiti",target:"95%",done:"91%",pct:96},FINANCE:{label:"Collection",target:"₹30,000",done:"₹22,500",pct:75},OPERATIONS:{label:"Dispatch",target:"30 order",done:"22 order",pct:73}};
const S={card:{background:"#1E293B",borderRadius:12,padding:"12px 14px",border:"1px solid #334155"},btn:(c,active)=>({padding:"7px 12px",borderRadius:10,border:"none",cursor:"pointer",background:active?c:"#0F172A",color:active?"#fff":"#64748B",fontWeight:active?700:400,fontSize:13,display:"flex",alignItems:"center",gap:5,flexShrink:0,whiteSpace:"nowrap"})};
const today=()=>{const d=new Date();return`${d.getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]} ${d.getFullYear()}`};

function Login({onLogin}){
  const[pin,setPin]=React.useState("");
  const[err,setErr]=React.useState("");
  const[tries,setTries]=React.useState(0);
  const press=(k)=>{
    if(tries>=5){setErr("Bahut zyada koshish. Baad mein try karo.");return;}
    if(k==="DEL"){setPin(p=>p.slice(0,-1));setErr("");return;}
    if(pin.length>=4)return;
    const np=pin+k;setPin(np);
    if(np.length===4){
      setTimeout(()=>{
        if(np==="1234"){onLogin();}
        else{const t=tries+1;setTries(t);setErr(t>=5?"Account lock ho gaya.":`Galat PIN. ${5-t} mauke bache.`);setPin("");}
      },300);
    }
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"#0F172A"}}>
      <div style={{fontSize:48,marginBottom:12}}>📊</div>
      <div style={{fontSize:28,fontWeight:900,color:"#fff",marginBottom:4}}>CoreBiz</div>
      <div style={{fontSize:13,color:"#64748B",marginBottom:32}}>Business Dashboard</div>
      <div style={{display:"flex",gap:16,marginBottom:12}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:pin.length>i?"#F59E0B":"#1E293B",border:"2px solid "+(pin.length>i?"#F59E0B":"#334155"),transition:"all 0.15s"}}/>)}
      </div>
      {err&&<div style={{color:"#F87171",fontSize:12,marginBottom:10,textAlign:"center",maxWidth:220}}>{err}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,68px)",gap:10,marginBottom:20}}>
        {["1","2","3","4","5","6","7","8","9","","0","DEL"].map((k,i)=>
          k===""?<div key={i}/>:
          <button key={i} onClick={()=>press(k)} style={{height:68,borderRadius:12,border:"none",background:"#1E293B",color:k==="DEL"?"#64748B":"#fff",fontSize:k==="DEL"?16:22,fontWeight:700,cursor:"pointer"}}>{k==="DEL"?"⌫":k}</button>
        )}
      </div>
      <div style={{fontSize:11,color:"#475569",textAlign:"center"}}>PIN: <span style={{color:"#F59E0B",letterSpacing:3,fontWeight:700}}>1234</span></div>
      <div style={{marginTop:12,display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
        {["🔐 Secure","🛡️ 5 limit","🔄 Auto logout"].map(b=><div key={b} style={{background:"#1E293B",borderRadius:20,padding:"3px 10px",fontSize:10,color:"#475569"}}>{b}</div>)}
      </div>
    </div>
  );
}

function App(){
  const[loggedIn,setLoggedIn]=React.useState(false);
  const[role,setRole]=React.useState("CEO");
  const[targetOn,setTargetOn]=React.useState(false);
  const[tasks,setTasks]=React.useState(Object.fromEntries(ROLES.map(r=>[r.key,DATA[r.key].tasks.map((t,i)=>({text:t,done:false,id:i}))])));
  const[newTask,setNewTask]=React.useState("");

  if(!loggedIn)return<Login onLogin={()=>setLoggedIn(true)}/>;

  const R=ROLES.find(r=>r.key===role);
  const data=DATA[role];
  const myTasks=tasks[role];
  const done=myTasks.filter(t=>t.done).length;
  const target=TARGETS[role];

  const toggle=id=>setTasks(p=>({...p,[role]:p[role].map(t=>t.id===id?{...t,done:!t.done}:t)}));
  const add=()=>{if(!newTask.trim())return;setTasks(p=>({...p,[role]:[...p[role],{text:newTask,done:false,id:Date.now()}]}));setNewTask("");};

  return(
    <div style={{minHeight:"100vh",background:"#0F172A",color:"#fff",fontFamily:"system-ui,sans-serif"}}>

      {/* Top Bar */}
      <div style={{background:"#1E293B",borderBottom:"1px solid #334155",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20}}>📊</span>
          <span style={{fontWeight:900,fontSize:17,color:"#F59E0B"}}>CoreBiz</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:10,color:"#475569"}}>{today()}</span>
          <button onClick={()=>setLoggedIn(false)} style={{background:"#0F172A",border:"1px solid #334155",borderRadius:7,padding:"4px 10px",color:"#64748B",fontSize:10,cursor:"pointer"}}>🔒 Logout</button>
        </div>
      </div>

      {/* Role Tabs */}
      <div style={{background:"#1E293B",borderBottom:"1px solid #334155",padding:"8px 10px",display:"flex",gap:6,overflowX:"auto"}}>
        {ROLES.map(r=>(
          <button key={r.key} onClick={()=>setRole(r.key)} style={S.btn(r.color,role===r.key)}>
            <span>{r.icon}</span>{r.label}
            {r.key!=="CEO"&&targetOn&&<span style={{width:6,height:6,borderRadius:"50%",background:"#10B981",marginLeft:2}}/>}
          </button>
        ))}
      </div>

      <div style={{padding:14,maxWidth:500,margin:"0 auto"}}>

        {/* Role Header */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style={{width:42,height:42,borderRadius:11,background:R.color+"22",border:`2px solid ${R.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{R.icon}</div>
          <div>
            <div style={{fontSize:16,fontWeight:800}}>{R.label} Dashboard</div>
            <div style={{fontSize:10,color:"#64748B"}}>Aaj ka hisaab · {today()}</div>
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {data.stats.map((s,i)=>(
            <div key={i} style={S.card}>
              <div style={{fontSize:10,color:"#64748B",marginBottom:4}}>{s.l}</div>
              <div style={{fontSize:19,fontWeight:800}}>{s.v}</div>
              <div style={{fontSize:11,color:s.up?"#10B981":"#F87171",marginTop:4,fontWeight:600}}>{s.up?"⬆️ Accha":"⬇️ Dhyan do"}</div>
            </div>
          ))}
        </div>

        {/* CEO Target Panel */}
        {role==="CEO"&&(
          <div style={{...S.card,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <div style={{fontSize:14,fontWeight:800}}>🎯 Aaj ka Target</div>
                <div style={{fontSize:10,color:"#64748B",marginTop:2}}>ON karo — sab ko target milega</div>
              </div>
              <div onClick={()=>setTargetOn(p=>!p)} style={{width:50,height:26,borderRadius:13,background:targetOn?"#10B981":"#334155",cursor:"pointer",position:"relative",transition:"background 0.3s"}}>
                <div style={{position:"absolute",top:3,left:targetOn?27:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.3s",boxShadow:"0 1px 4px #0006"}}/>
              </div>
            </div>
            {targetOn?(
              <div>
                <div style={{background:"#064E3B",borderRadius:8,padding:"7px 11px",marginBottom:10,fontSize:11,color:"#34D399"}}>✅ Target ON — sabhi departments dekh sakte hain</div>
                {Object.entries(TARGETS).map(([k,t])=>{
                  const r=ROLES.find(x=>x.key===k);
                  return(
                    <div key={k} style={{background:"#0F172A",borderRadius:9,padding:"10px 12px",marginBottom:7,border:`1px solid ${r.color}33`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:16}}>{r.icon}</span>
                          <div>
                            <div style={{fontSize:10,color:"#94A3B8"}}>{r.label}</div>
                            <div style={{fontSize:12,fontWeight:700}}>{t.label}: <span style={{color:r.color}}>{t.target}</span></div>
                          </div>
                        </div>
                        <div style={{fontSize:12,fontWeight:800,color:r.color}}>{t.pct}%</div>
                      </div>
                      <div style={{height:5,background:"#1E293B",borderRadius:3}}>
                        <div style={{height:"100%",width:`${t.pct}%`,background:r.color,borderRadius:3}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748B",marginTop:4}}>
                        <span>Hua: {t.done}</span><span>Target: {t.target}</span>
                      </div>
                    </div>
                  );
                })}
                <button style={{width:"100%",marginTop:6,background:"#F59E0B",border:"none",borderRadius:9,padding:11,color:"#000",fontWeight:800,fontSize:13,cursor:"pointer"}}>📤 Sabko Target Bhejo</button>
              </div>
            ):(
              <div style={{textAlign:"center",color:"#475569",fontSize:12,padding:10}}>☝️ Toggle ON karo target bhejne ke liye</div>
            )}
          </div>
        )}

        {/* Dept Target Banner */}
        {role!=="CEO"&&target&&targetOn&&(
          <div style={{...S.card,marginBottom:14,border:`2px solid ${R.color}55`}}>
            <div style={{fontSize:10,color:"#64748B",marginBottom:3}}>🎯 CEO ne aaj ka target diya:</div>
            <div style={{fontSize:15,fontWeight:800,color:R.color,marginBottom:8}}>{target.label}: {target.target}</div>
            <div style={{height:7,background:"#0F172A",borderRadius:4,marginBottom:6}}>
              <div style={{height:"100%",width:`${target.pct}%`,background:R.color,borderRadius:4}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#64748B"}}>
              <span>✅ Hua: <span style={{color:R.color,fontWeight:700}}>{target.done}</span></span>
              <span style={{color:target.pct>=80?"#10B981":"#F59E0B",fontWeight:700}}>{target.pct}% complete</span>
            </div>
          </div>
        )}

        {/* Tasks */}
        <div style={{...S.card}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:14,fontWeight:800}}>📋 Aaj ke Kaam</div>
            <div style={{fontSize:12,color:R.color,fontWeight:700}}>{done}/{myTasks.length} ho gaye</div>
          </div>
          <div style={{height:5,background:"#0F172A",borderRadius:3,marginBottom:11}}>
            <div style={{height:"100%",width:`${myTasks.length?(done/myTasks.length)*100:0}%`,background:R.color,borderRadius:3,transition:"width 0.4s"}}/>
          </div>
          {myTasks.map(task=>(
            <div key={task.id} onClick={()=>toggle(task.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 11px",background:"#0F172A",borderRadius:8,border:"1px solid #334155",marginBottom:5,cursor:"pointer"}}>
              <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${task.done?R.color:"#475569"}`,background:task.done?R.color:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
                {task.done&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}
              </div>
              <span style={{flex:1,fontSize:13,color:task.done?"#475569":"#CBD5E1",textDecoration:task.done?"line-through":"none"}}>{task.text}</span>
            </div>
          ))}
          <div style={{display:"flex",gap:7,marginTop:9}}>
            <input value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Naya kaam likho..."
              style={{flex:1,background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"9px 11px",color:"#fff",fontSize:12,outline:"none"}}/>
            <button onClick={add} style={{background:R.color,border:"none",borderRadius:8,padding:"9px 14px",color:"#fff",fontWeight:900,fontSize:16,cursor:"pointer"}}>+</button>
          </div>
        </div>

        <div style={{textAlign:"center",marginTop:14,padding:"8px",background:"#1E293B",borderRadius:9,fontSize:10,color:"#334155"}}>
          🔐 Secure · Free · CoreBiz
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
